name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore NpmCdn.slnx
        
      - name: Enforce Formatting
        run: dotnet format NpmCdn.slnx --verify-no-changes
        
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Publish API
        run: dotnet publish src/NpmCdn.Api/src/NpmCdn.Api.csproj -c Release --no-restore
        
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Execute Tests (TUnit)
        run: dotnet test NpmCdn.slnx -c Release --no-build
