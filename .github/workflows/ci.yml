name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore NpmCdn.slnx --locked-mode
        
      - name: Enforce Formatting
        run: dotnet format NpmCdn.slnx --verify-no-changes
        
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Build Everything
        run: dotnet build NpmCdn.slnx -c Release

      - name: Publish API
        run: dotnet publish src/NpmCdn.Api/src/NpmCdn.Api.csproj -c Release --no-build
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .
          include-hidden-files: true
          
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Execute Tests (TUnit)
        run: |
          shopt -s globstar
          for proj in src/**/tests/**/*.csproj; do
            echo "Running tests for $proj"
            
            # Grant execute permissions to the built artifact on Linux runners
            proj_dir=$(dirname "$proj")
            proj_name=$(basename "${proj%.csproj}")
            chmod +x "$proj_dir/bin/Release/net10.0/$proj_name" || true

            dotnet run --project "$proj" -c Release --no-build -- --report-trx --coverage --coverage-output-format cobertura --coverage-output CodeCoverage.xml
          done

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: '**/CodeCoverage.xml'
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Write to Job Summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Commit Badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # The irongut action outputs a Shields.io URL in the Markdown file, not an SVG directly.
          # Extract the URL BEFORE switching branches (rm -rf would delete the file otherwise).
          BADGE_URL=$(grep -o 'https://img.shields.io/badge/Code%20Coverage-[^)]*' code-coverage-results.md || true)

          git fetch origin badges || true
          git checkout badges 2>/dev/null || git checkout --orphan badges
          git rm -rf . || true

          if [ ! -z "$BADGE_URL" ]; then
            curl -s "$BADGE_URL" -o coverage.svg
            git add coverage.svg
            git commit -m "Update coverage badge" || echo "No changes to commit"
            git push -f origin badges
          else
            echo "Failed to extract badge URL from code-coverage-results.md"
          fi
